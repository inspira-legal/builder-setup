name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build all targets
        run: bun run build

      - name: Upload binaries to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
